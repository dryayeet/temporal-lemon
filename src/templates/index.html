<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lemon</title>
  <link rel="icon" type="image/png" href="/static/lemon.png" />
  <link rel="apple-touch-icon" href="/static/lemon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <style>
    /* Default: light. Lemon sorbet scoop melting into vanilla ice cream. */
    :root {
      --bg: #fdf8e8;
      --panel: #fbe9a5;
      --chat-bg: #fbf4dd;
      --bubble-you: #fae18a;
      --bubble-you-text: #3a2f1e;
      --bubble-lemon: #fefaea;
      --bubble-lemon-text: #2a2520;
      --bubble-system: #f3ead1;
      --text: #3a2f1e;
      --muted: #a59879;
      --accent: #d4a33c;
      --border: rgba(58, 47, 30, 0.08);
      --border-strong: rgba(58, 47, 30, 0.14);
      --shadow-bubble: 0 4px 16px rgba(199, 154, 58, 0.14);
      --shadow-panel: 0 1px 3px rgba(58, 47, 30, 0.05);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; }
    .sidebar {
      width: 280px;
      background: var(--panel);
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-panel);
    }
    .sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 16px 0 8px; }
    .sidebar h2:first-child { margin-top: 0; }
    .sidebar pre { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; background: var(--border); padding: 8px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; }
    .main { flex: 1; display: flex; flex-direction: column; max-width: 100%; }
    .header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; }
    .header h1 .logo {
      width: 32px; height: 32px; border-radius: 8px;
      image-rendering: pixelated; image-rendering: crisp-edges;
      box-shadow: 0 1px 4px rgba(58, 47, 30, 0.18);
    }
    .header .hint { font-size: 12px; color: var(--muted); }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; background: var(--chat-bg); }
    .bubble {
      max-width: 75%; padding: 12px 16px; border-radius: 18px;
      line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
      box-shadow: var(--shadow-bubble);
    }
    .bubble.you { align-self: flex-end; background: var(--bubble-you); color: var(--bubble-you-text); border-bottom-right-radius: 6px; }
    .bubble.lemon { align-self: flex-start; background: var(--bubble-lemon); color: var(--bubble-lemon-text); border-bottom-left-radius: 6px; }
    .bubble.system {
      align-self: center; background: var(--bubble-system); color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
      max-width: 90%; white-space: pre-wrap;
    }
    .typing { align-self: flex-start; color: var(--muted); font-style: italic; padding: 4px 14px; display: flex; align-items: center; gap: 8px; }
    .typing .phase-label { transition: opacity 0.25s ease; display: inline-block; }
    .typing .phase-label.swapping { opacity: 0; transform: translateY(-2px); }
    .typing .dots { display: inline-flex; gap: 3px; align-items: center; margin-left: 2px; }
    .typing .dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.6; animation: sprinkleBounce 1.4s infinite ease-in-out both; }
    .typing .dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing .dots span:nth-child(2) { animation-delay: -0.16s; }
    .typing .dots span:nth-child(3) { animation-delay: 0s; }
    @keyframes sprinkleBounce {
      0%, 80%, 100% { transform: translateY(0) scale(0.5); opacity: 0.3; }
      40%           { transform: translateY(-4px) scale(1); opacity: 1; }
    }
    .composer { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); }
    .composer input {
      flex: 1; padding: 10px 14px; border-radius: 22px;
      border: 1px solid var(--border-strong); background: var(--bg); color: var(--text);
      font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .composer input:focus { border-color: var(--accent); }
    .composer button {
      background: var(--accent); color: white; border: none;
      padding: 0 18px; border-radius: 22px; font-weight: 600; cursor: pointer;
      transition: filter 0.15s;
    }
    .composer button:hover:not(:disabled) { filter: brightness(1.08); }
    .composer button:disabled { opacity: 0.4; cursor: not-allowed; }
    .refresh { background: none; border: 1px solid var(--border-strong); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
    .refresh:hover { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .theme-toggle {
      background: none; border: 1px solid var(--border-strong); color: var(--muted);
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
      font-size: 14px; line-height: 1; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); background: var(--border); border-color: var(--accent); }

    /* Dark mode is opt-in only via the toggle. :root is the default (light). */
    :root[data-theme="dark"] {
      --bg: #1a150c;
      --panel: #2a1f0e;
      --chat-bg: #1f1a10;
      --bubble-you: #e8c872;
      --bubble-you-text: #1a150c;
      --bubble-lemon: #2a2419;
      --bubble-lemon-text: #f5ecd3;
      --bubble-system: #20180d;
      --text: #f5ecd3;
      --muted: #a8957a;
      --accent: #e8c872;
      --border: rgba(245, 236, 211, 0.08);
      --border-strong: rgba(245, 236, 211, 0.14);
      --shadow-bubble: 0 4px 16px rgba(0, 0, 0, 0.35);
      --shadow-panel: 0 1px 3px rgba(0, 0, 0, 0.25);
    }
  </style>
  <script>
    // applied before body paints so saved theme doesn't flash on load
    (function () {
      var saved = localStorage.getItem("lemon-theme");
      if (saved === "light" || saved === "dark") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>
</head>
<body>
  <aside class="sidebar">
    <h2>internal state <button class="refresh" onclick="loadState()">↻</button></h2>
    <pre id="state">loading…</pre>
    <h2>facts <button class="refresh" onclick="loadFacts()">↻</button></h2>
    <pre id="facts">loading…</pre>
    <h2>recent sessions</h2>
    <pre id="sessions">loading…</pre>
  </aside>

  <div class="main">
    <div class="header">
      <h1><img src="/static/lemon.png" class="logo" alt="lemon" />lemon</h1>
      <div class="header-right">
        <div class="hint">type <code>/help</code> for commands</div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="toggle light/dark" aria-label="toggle theme">☾</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="input" placeholder="say something..." autocomplete="off" autofocus />
      <button id="send" onclick="send()">send</button>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const messagesEl = $("messages");
    const inputEl = $("input");
    const sendBtn = $("send");

    // ---- theme toggle ----
    function currentTheme() {
      const forced = document.documentElement.getAttribute("data-theme");
      if (forced === "dark") return "dark";
      return "light";  // default regardless of OS preference
    }
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      const btn = $("theme-toggle");
      if (btn) btn.textContent = theme === "dark" ? "☀" : "☾";
    }
    function toggleTheme() {
      const next = currentTheme() === "dark" ? "light" : "dark";
      localStorage.setItem("lemon-theme", next);
      applyTheme(next);
    }
    // sync the toggle icon to whatever theme is already active at paint time
    (function syncToggleIcon() {
      const btn = $("theme-toggle");
      if (btn) btn.textContent = currentTheme() === "dark" ? "☀" : "☾";
    })();

    function bubble(role, text) {
      const cls = role === "user" ? "you" : role === "assistant" ? "lemon" : "system";
      const div = document.createElement("div");
      div.className = "bubble " + cls;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // ice cream parlor theme for the typing indicator.
    // one flat phrase pool; we pick one at random on every phase event,
    // regardless of which phase fired, so the label stays varied.
    const PHASE_PHRASES = [
      "tasting the mood",
      "sniffing the vibe",
      "reading the menu",
      "sampling the flavor",
      "checking the temperature",
      "rifling the sprinkle jar",
      "rummaging the topping bins",
      "digging through the freezer",
      "flipping through the flavor cards",
      "checking the chalkboard",
      "picking a flavor",
      "swirling the softserve",
      "choosing a scoop",
      "weighing the cones",
      "brainfreeze computing",
      "debating sorbet vs gelato",
      "drizzling syrup",
      "adding the cherry",
      "garnishing with mint",
      "plating the cone",
      "packing the scoop",
      "finishing with sprinkles",
      "re-scooping",
      "swapping the cone",
      "re-drizzling",
      "starting the scoop over",
      "writing on the chalkboard menu",
      "jotting a new flavor idea",
      "filing a sprinkle note",
      "polishing the scoop",
      "warming the waffle cone",
      "tempering the chocolate",
      "grinding pistachios",
      "toasting almond slivers",
      "glazing the rim",
      "dusting cocoa powder",
      "folding in the fudge",
      "churning a fresh batch",
      "rolling a cone",
      "stirring the caramel",
      "torching the meringue",
      "crumbling the biscotti",
      "whipping the cream",
      "zesting a lemon",
      "squeezing the citrus",
    ];

    function pickPhrase() {
      return PHASE_PHRASES[Math.floor(Math.random() * PHASE_PHRASES.length)];
    }

    function typingIndicator() {
      const div = document.createElement("div");
      div.className = "typing";

      const label = document.createElement("span");
      label.className = "phase-label";
      label.textContent = "warming up the scoop";

      const dots = document.createElement("span");
      dots.className = "dots";
      dots.innerHTML = "<span></span><span></span><span></span>";

      div.appendChild(label);
      div.appendChild(dots);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return {
        el: div,
        setPhase: (p) => {
          // gentle cross-fade: fade out, swap text, fade in
          label.classList.add("swapping");
          setTimeout(() => {
            label.textContent = pickPhrase(p);
            label.classList.remove("swapping");
          }, 200);
        },
      };
    }

    async function loadHistory() {
      const r = await fetch("/history");
      const data = await r.json();
      messagesEl.innerHTML = "";
      data.forEach(m => {
        if (m.role === "assistant" && m.content.includes("\n\n")) {
          m.content.split("\n\n").forEach(p => { if (p) bubble("assistant", p); });
        } else {
          bubble(m.role, m.content);
        }
      });
    }

    async function loadState() {
      const r = await fetch("/state");
      $("state").textContent = JSON.stringify(await r.json(), null, 2);
    }
    async function loadFacts() {
      const r = await fetch("/facts");
      const facts = await r.json();
      $("facts").textContent = Object.keys(facts).length === 0
        ? "(none yet — lemon saves facts as you chat, or type /remember key=value)"
        : Object.entries(facts).map(([k, v]) => k + ": " + v).join("\n");
    }
    async function loadSessions() {
      const r = await fetch("/sessions");
      const rows = await r.json();
      $("sessions").textContent = rows.map(r =>
        `#${r.id} • ${r.msg_count} msgs • ${r.started_at.slice(0,16)}`
      ).join("\n") || "(none)";
    }

    async function runCommand(text) {
      const r = await fetch("/command", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await r.json();
      bubble("system", data.output);
      loadState(); loadFacts(); loadSessions();
    }

    async function streamChat(message) {
      const typing = typingIndicator();
      let lemonBubble = null;   // created on first token

      const r = await fetch("/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      if (!r.ok) {
        typing.el.remove();
        bubble("system", `error: ${r.status} ${await r.text()}`);
        return;
      }

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const events = buf.split("\n\n");
        buf = events.pop();
        for (const evt of events) {
          if (!evt.startsWith("data:")) continue;
          try {
            const payload = JSON.parse(evt.slice(5).trim());
            if (payload.event === "phase") {
              typing.setPhase(payload.data);
            } else if (payload.event === "token") {
              const chunks = payload.data.split("\n\n");
              for (let i = 0; i < chunks.length; i++) {
                if (i > 0) { lemonBubble = null; }
                if (chunks[i] === "") continue;
                if (!lemonBubble) {
                  if (typing.el.parentNode) typing.el.remove();
                  lemonBubble = bubble("assistant", "");
                }
                lemonBubble.textContent += chunks[i];
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (payload.event === "error") {
              typing.el.remove();
              if (lemonBubble) lemonBubble.remove();
              bubble("system", "error: " + payload.data);
            }
          } catch (e) { /* ignore parse errors */ }
        }
      }
      loadState();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;

      try {
        if (text.startsWith("/")) {
          bubble("user", text);
          await runCommand(text);
        } else {
          bubble("user", text);
          await streamChat(text);
        }
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    loadHistory();
    loadState();
    loadFacts();
    loadSessions();
  </script>
</body>
</html>
