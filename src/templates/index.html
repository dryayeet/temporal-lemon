<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lemon</title>
  <style>
    :root {
      --bg: #fdf6e3;
      --panel: #f7ecc9;
      --bubble-you: #f2c94c;
      --bubble-lemon: #fffdf5;
      --bubble-system: #efe3bd;
      --text: #2a2110;
      --muted: #8a7a4a;
      --accent: #b8860b;
      --border: rgba(74, 56, 12, 0.08);
      --border-strong: rgba(74, 56, 12, 0.14);
      --shadow-bubble: 0 4px 12px rgba(74, 56, 12, 0.08);
      --shadow-panel: 0 1px 2px rgba(74, 56, 12, 0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14100a;
        --panel: #1c1710;
        --bubble-you: #a8781c;
        --bubble-lemon: #221b10;
        --bubble-system: #1a150c;
        --text: #f4e9c9;
        --muted: #a8936a;
        --accent: #e8c07a;
        --border: rgba(244, 233, 201, 0.08);
        --border-strong: rgba(244, 233, 201, 0.14);
        --shadow-bubble: 0 4px 12px rgba(0, 0, 0, 0.25);
        --shadow-panel: 0 1px 2px rgba(0, 0, 0, 0.3);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; }
    .sidebar {
      width: 280px;
      background: var(--panel);
      padding: 16px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-panel);
    }
    .sidebar h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin: 16px 0 8px; }
    .sidebar h2:first-child { margin-top: 0; }
    .sidebar pre { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; background: var(--border); padding: 8px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; }
    .main { flex: 1; display: flex; flex-direction: column; max-width: 100%; }
    .header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .header h1 { margin: 0; font-size: 20px; font-weight: 700; }
    .header .hint { font-size: 12px; color: var(--muted); }
    .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .bubble {
      max-width: 75%; padding: 12px 16px; border-radius: 18px;
      line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
      box-shadow: var(--shadow-bubble);
    }
    .bubble.you { align-self: flex-end; background: var(--bubble-you); border-bottom-right-radius: 6px; }
    .bubble.lemon { align-self: flex-start; background: var(--bubble-lemon); border-bottom-left-radius: 6px; }
    .bubble.system {
      align-self: center; background: var(--bubble-system); color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px;
      max-width: 90%; white-space: pre-wrap;
    }
    .typing { align-self: flex-start; color: var(--muted); font-style: italic; padding: 4px 14px; display: flex; align-items: center; gap: 4px; }
    .typing .phase-label { transition: opacity 0.2s; }
    .typing .dots::after { content: "..."; display: inline-block; width: 18px; text-align: left; animation: blink 1.2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    .composer { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); }
    .composer input {
      flex: 1; padding: 10px 14px; border-radius: 22px;
      border: 1px solid var(--border-strong); background: var(--bg); color: var(--text);
      font-size: 14px; outline: none;
      transition: border-color 0.15s;
    }
    .composer input:focus { border-color: var(--accent); }
    .composer button {
      background: var(--accent); color: white; border: none;
      padding: 0 18px; border-radius: 22px; font-weight: 600; cursor: pointer;
      transition: filter 0.15s;
    }
    .composer button:hover:not(:disabled) { filter: brightness(1.08); }
    .composer button:disabled { opacity: 0.4; cursor: not-allowed; }
    .refresh { background: none; border: 1px solid var(--border-strong); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
    .refresh:hover { color: var(--text); }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h2>internal state <button class="refresh" onclick="loadState()">↻</button></h2>
    <pre id="state">loading…</pre>
    <h2>facts <button class="refresh" onclick="loadFacts()">↻</button></h2>
    <pre id="facts">loading…</pre>
    <h2>recent sessions</h2>
    <pre id="sessions">loading…</pre>
  </aside>

  <div class="main">
    <div class="header">
      <h1>🍋 lemon</h1>
      <div class="hint">type <code>/help</code> for commands</div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="composer">
      <input id="input" placeholder="say something..." autocomplete="off" autofocus />
      <button id="send" onclick="send()">send</button>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const messagesEl = $("messages");
    const inputEl = $("input");
    const sendBtn = $("send");

    function bubble(role, text) {
      const cls = role === "user" ? "you" : role === "assistant" ? "lemon" : "system";
      const div = document.createElement("div");
      div.className = "bubble " + cls;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function typingIndicator() {
      const div = document.createElement("div");
      div.className = "typing";
      const label = document.createElement("span");
      label.className = "phase-label";
      label.textContent = "lemon is thinking";
      const dots = document.createElement("span");
      dots.className = "dots";
      div.appendChild(label);
      div.appendChild(dots);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return { el: div, setPhase: (p) => { label.textContent = "lemon is " + p; } };
    }

    async function loadHistory() {
      const r = await fetch("/history");
      const data = await r.json();
      messagesEl.innerHTML = "";
      data.forEach(m => {
        if (m.role === "assistant" && m.content.includes("\n\n")) {
          m.content.split("\n\n").forEach(p => { if (p) bubble("assistant", p); });
        } else {
          bubble(m.role, m.content);
        }
      });
    }

    async function loadState() {
      const r = await fetch("/state");
      $("state").textContent = JSON.stringify(await r.json(), null, 2);
    }
    async function loadFacts() {
      const r = await fetch("/facts");
      const facts = await r.json();
      $("facts").textContent = Object.keys(facts).length === 0
        ? "(none yet)"
        : Object.entries(facts).map(([k, v]) => k + ": " + v).join("\n");
    }
    async function loadSessions() {
      const r = await fetch("/sessions");
      const rows = await r.json();
      $("sessions").textContent = rows.map(r =>
        `#${r.id} • ${r.msg_count} msgs • ${r.started_at.slice(0,16)}`
      ).join("\n") || "(none)";
    }

    async function runCommand(text) {
      const r = await fetch("/command", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await r.json();
      bubble("system", data.output);
      loadState(); loadFacts(); loadSessions();
    }

    async function streamChat(message) {
      const typing = typingIndicator();
      let lemonBubble = null;   // created on first token

      const r = await fetch("/chat", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      if (!r.ok) {
        typing.el.remove();
        bubble("system", `error: ${r.status} ${await r.text()}`);
        return;
      }

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const events = buf.split("\n\n");
        buf = events.pop();
        for (const evt of events) {
          if (!evt.startsWith("data:")) continue;
          try {
            const payload = JSON.parse(evt.slice(5).trim());
            if (payload.event === "phase") {
              typing.setPhase(payload.data);
            } else if (payload.event === "token") {
              const chunks = payload.data.split("\n\n");
              for (let i = 0; i < chunks.length; i++) {
                if (i > 0) { lemonBubble = null; }
                if (chunks[i] === "") continue;
                if (!lemonBubble) {
                  if (typing.el.parentNode) typing.el.remove();
                  lemonBubble = bubble("assistant", "");
                }
                lemonBubble.textContent += chunks[i];
              }
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (payload.event === "error") {
              typing.el.remove();
              if (lemonBubble) lemonBubble.remove();
              bubble("system", "error: " + payload.data);
            }
          } catch (e) { /* ignore parse errors */ }
        }
      }
      loadState();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      sendBtn.disabled = true;

      try {
        if (text.startsWith("/")) {
          bubble("user", text);
          await runCommand(text);
        } else {
          bubble("user", text);
          await streamChat(text);
        }
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    loadHistory();
    loadState();
    loadFacts();
    loadSessions();
  </script>
</body>
</html>
